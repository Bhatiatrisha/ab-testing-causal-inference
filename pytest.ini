[pytest]
testpaths       = tests
python_files    = test_*.py
python_classes  = Test*
python_functions= test_*

# Show short tracebacks, print test names as they run
addopts =
    -v
    --tb=short
    --strict-markers

# Custom markers (add more as needed)
markers =
    slow: marks tests as slow (deselect with -m "not slow")
    integration: marks end-to-end integration tests
